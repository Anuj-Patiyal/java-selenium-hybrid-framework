name: 🚀 Java CI - Dev Branch Workflow

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

permissions:
  contents: read  # ✅ Only required permission now

jobs:
  build-and-test:
    name: 🔧 Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🧼 Validate Maven project
        run: mvn validate

      - name: 🧪 Build & Run Tests
        run: mvn clean test

      - name: 📂 Debug workspace (Optional)
        if: always()
        run: |
          echo "Working directory: $(pwd)"
          ls -la
